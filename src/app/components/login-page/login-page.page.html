<form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
  <ion-header>
    <ion-toolbar>
      <ion-title>Login</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-content class="ion-padding">
    <ion-grid>
      <ion-row>
        <ion-col>
          <ion-list>
            <ion-item>
              <ion-input
                formControlName="email"
                label="Email"
                labelPlacement="floating"
                type="email"
                placeholder="user@gmail.com"
              ></ion-input>
            </ion-item>

            <ion-item>
              <ion-input
                formControlName="password"
                type="password"
                label="Password"
                labelPlacement="floating"
              ></ion-input>
            </ion-item>
          </ion-list>
        </ion-col>
      </ion-row>

      <ion-row>
        <ion-col>
          <ion-button expand="block" type="submit">
            Login
          </ion-button>
        </ion-col>
      </ion-row>

      <ion-row>
        <ion-col class="ion-text-center">
          <p>
            No account yet ?
            <a routerLink="/register">Register here</a>
          </p>
        </ion-col>
      </ion-row>
    </ion-grid>
  </ion-content>
</form>
